<!-- Estimates Page -->
<div class="page-header">
    <div>
        <h1 class="page-title">
            <i class="fas fa-file-invoice"></i>
            Estimate Management
        </h1>
        <p class="page-subtitle">All estimates and quotations</p>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="estimate-search" placeholder="Estimate Search" onkeyup="searchEstimates()">
    </div>
    <button class="btn btn-primary" onclick="showNewEstimateForm()">
        <i class="fas fa-plus"></i>
        New Estimate
    </button>
</div>

<!-- Filter Controls -->
<div class="filter-controls">
    <div class="filter-group">
        <label for="estimate-status-filter">Status:</label>
        <select id="estimate-status-filter" onchange="filterEstimatesByStatus()">
            <option value="">All Statuses</option>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="accepted">Accepted</option>
            <option value="rejected">Rejected</option>
            <option value="expired">Expired</option>
        </select>
    </div>
    <div class="filter-group">
        <label for="estimate-customer-filter">Customer:</label>
        <select id="estimate-customer-filter" onchange="filterEstimatesByCustomer()">
            <option value="">All Customers</option>
            <!-- Customer options will be loaded here -->
        </select>
    </div>
    <div class="filter-group">
        <button class="btn btn-warning" onclick="showExpiredEstimates()">
            <i class="fas fa-clock"></i>
            Show Expired
        </button>
    </div>
</div>

<div class="table-container">
    <div class="table-header">
        <i class="fas fa-file-invoice"></i>
        Estimate List
    </div>
    <div class="table-controls">
        <div>Showing <span id="estimate-range">1 to 20</span> of <span id="estimate-total">0</span> estimates</div>
        <div>
            <select id="estimate-per-page" onchange="changeEstimatePerPage()">
                <option value="20" selected>20 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
            </select>
        </div>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Estimate No</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Vehicle</th>
                <th>Job</th>
                <th>Description</th>
                <th>Status</th>
                <th>Valid Until</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="estimates-table-body">
            <tr>
                <td colspan="10" class="loading">
                    <div class="spinner"></div>
                    Loading estimates...
                </td>
            </tr>
        </tbody>
    </table>
    <div class="pagination" id="estimate-pagination">
        <!-- Pagination will be generated here -->
    </div>
</div>

<!-- Estimate Detail Modal -->
<div id="estimate-detail-modal" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h2><i class="fas fa-file-invoice"></i> Estimate Details</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="estimate-detail-content">
                <!-- Estimate details will be loaded here -->
            </div>
        </div>
    </div>
</div>

<!-- New Estimate Modal -->
<div id="new-estimate-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-plus"></i> New Estimate</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="new-estimate-form" onsubmit="createEstimate(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="estimate-customer">Customer *</label>
                        <select id="estimate-customer" name="customer_id" required onchange="loadEstimateCustomerData()">
                            <option value="">Select Customer</option>
                            <!-- Customer options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="estimate-vehicle">Vehicle</label>
                        <select id="estimate-vehicle" name="vehicle_id">
                            <option value="">Select Vehicle</option>
                            <!-- Vehicle options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="estimate-job">Related Job</label>
                        <select id="estimate-job" name="job_id">
                            <option value="">Select Job (Optional)</option>
                            <!-- Job options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="estimate-description">Description *</label>
                        <textarea id="estimate-description" name="description" required rows="3" 
                                  placeholder="Describe the work to be estimated..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="estimate-total-amount">Total Amount (£) *</label>
                        <input type="number" id="estimate-total-amount" name="total_amount" 
                               required min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="estimate-valid-until">Valid Until</label>
                        <input type="date" id="estimate-valid-until" name="valid_until">
                    </div>
                    <div class="form-group">
                        <label for="estimate-status">Status</label>
                        <select id="estimate-status" name="status">
                            <option value="draft">Draft</option>
                            <option value="sent">Sent</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Estimate</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Estimate Modal -->
<div id="edit-estimate-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-edit"></i> Edit Estimate</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="edit-estimate-form" onsubmit="updateEstimate(event)">
                <input type="hidden" id="edit-estimate-id" name="id">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="edit-estimate-number">Estimate Number</label>
                        <input type="text" id="edit-estimate-number" name="estimate_number" readonly>
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-customer">Customer *</label>
                        <select id="edit-estimate-customer" name="customer_id" required onchange="loadEditEstimateCustomerData()">
                            <option value="">Select Customer</option>
                            <!-- Customer options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-vehicle">Vehicle</label>
                        <select id="edit-estimate-vehicle" name="vehicle_id">
                            <option value="">Select Vehicle</option>
                            <!-- Vehicle options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-job">Related Job</label>
                        <select id="edit-estimate-job" name="job_id">
                            <option value="">Select Job (Optional)</option>
                            <!-- Job options will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="edit-estimate-description">Description *</label>
                        <textarea id="edit-estimate-description" name="description" required rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-total-amount">Total Amount (£) *</label>
                        <input type="number" id="edit-estimate-total-amount" name="total_amount" 
                               required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-valid-until">Valid Until</label>
                        <input type="date" id="edit-estimate-valid-until" name="valid_until">
                    </div>
                    <div class="form-group">
                        <label for="edit-estimate-status">Status</label>
                        <select id="edit-estimate-status" name="status">
                            <option value="draft">Draft</option>
                            <option value="sent">Sent</option>
                            <option value="accepted">Accepted</option>
                            <option value="rejected">Rejected</option>
                            <option value="expired">Expired</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Estimate</button>
                </div>
            </form>
        </div>
    </div>
</div>
